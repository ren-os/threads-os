name: GA4 Daily Report

on:
  schedule:
    # 毎朝9時JST (UTC 0時) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'レポートモード'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - daily
          - weekly

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account credentials
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
        run: |
          mkdir -p config
          echo "$GA4_CREDENTIALS_JSON" > config/ga4_service_account.json

      - name: Generate report
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: config/ga4_service_account.json
        run: |
          MODE="${{ github.event.inputs.mode || 'both' }}"
          python scripts/ga4_report.py $MODE

      - name: Commit and push reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analysis/daily_report.md analysis/weekly_report.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GA4 reports $(date +'%Y-%m-%d')"
            git push
          fi
