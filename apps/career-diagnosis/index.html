<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>転職タイプ診断 | れん｜会社員の逃げ道</title>
  <meta name="description" content="第二新卒・フリーター・既卒向け。5問であなたの転職タイプを診断します。">

  <!-- OGP -->
  <meta property="og:title" content="転職タイプ診断">
  <meta property="og:description" content="5問であなたの転職タイプを診断。第二新卒・フリーター・既卒向け。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="./assets/ogp.png">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="app-wrapper">

  <!-- ========== TOP ========== -->
  <section id="screen-top" class="screen active">
    <div class="top-visual">
      <span class="top-emoji">🧭</span>
      <h1 class="top-title">転職タイプ診断</h1>
      <p class="top-subtitle">あなたに合った転職の進め方がわかります</p>

      <div class="top-meta">
        <div class="meta-item">
          <span class="meta-label">質問数</span>
          <span class="meta-value">5問</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">所要時間</span>
          <span class="meta-value">約1分</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">無料</span>
          <span class="meta-value">完全無料</span>
        </div>
      </div>

      <button id="start-btn" class="btn btn-primary">診断スタート</button>
      <p class="top-note">登録不要・メアド不要</p>
    </div>
  </section>

  <!-- ========== QUESTION ========== -->
  <section id="screen-question" class="screen">

    <div class="progress-bar-wrap">
      <div class="progress-header">
        <span>質問 <span id="progress-current">0</span> / <span id="progress-total">5</span></span>
        <span id="progress-pct"></span>
      </div>
      <div class="progress-bar-track">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="question-card">
      <p id="question-number" class="question-number"></p>
      <p id="question-text" class="question-text"></p>
      <div id="options-list" class="options-list"></div>
    </div>

    <button id="next-btn" class="btn btn-primary" disabled>次へ</button>
    <button id="prev-btn" class="btn btn-secondary" style="margin-top:10px">← 前の質問に戻る</button>

  </section>

  <!-- ========== LOADING ========== -->
  <section id="screen-loading" class="screen loading-screen">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <p class="loading-text">あなたのタイプを診断中...</p>
  </section>

  <!-- ========== RESULT ========== -->
  <section id="screen-result" class="screen">

    <div class="result-header">
      <span id="result-emoji" class="result-emoji"></span>
      <p class="result-label">あなたのタイプ</p>
      <h2 id="result-title" class="result-title"></h2>
    </div>

    <div class="result-card">
      <p class="card-title">診断結果</p>
      <p id="result-description" class="result-description"></p>
    </div>

    <div class="result-card">
      <p class="card-title">あなたへのアドバイス</p>
      <ul id="advice-list" class="advice-list"></ul>
    </div>

    <div class="result-cta-section">
      <p class="cta-heading">まず話だけでも聞いてみませんか？</p>
      <p class="cta-sub">無料・登録後のゴリ押しなし</p>
      <button id="cta-btn" class="btn btn-cta"></button>
    </div>

    <div class="result-share-section">
      <p class="share-text">診断結果をシェアする</p>
      <div class="share-buttons">
        <button id="share-threads" class="share-btn share-btn-threads">Threads</button>
        <button id="share-x" class="share-btn share-btn-x">X (Twitter)</button>
      </div>
    </div>

    <button id="retry-btn" class="btn btn-secondary" style="margin-top:20px">もう一度診断する</button>

  </section>

</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
